<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>MF103 N64 Overlay v0.4</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="overlay">
  <img id="base" src="assets/controller-base.png" alt="N64 controller">

  <img id="glow-a" class="glow" src="assets/glow-blue.png">
  <img id="glow-b" class="glow" src="assets/glow-green.png">
  <img id="glow-start" class="glow" src="assets/glow-red.png">
  <img id="glow-cup" class="glow" src="assets/glow-yellow.png">
  <img id="glow-cdown" class="glow" src="assets/glow-yellow.png">
  <img id="glow-cleft" class="glow" src="assets/glow-yellow.png">
  <img id="glow-cright" class="glow" src="assets/glow-yellow.png">
  <img id="glow-z" class="glow" src="assets/glow-white.png">
  <div id="press-a" class="press-layer press-a"></div>
  <div id="press-b" class="press-layer press-b"></div>
  <div id="press-start" class="press-layer press-start"></div>
  <div id="press-cup" class="press-layer press-c press-cup"></div>
  <div id="press-cdown" class="press-layer press-c press-cdown"></div>
  <div id="press-cleft" class="press-layer press-c press-cleft"></div>
  <div id="press-cright" class="press-layer press-c press-cright"></div>
  <div id="glow-l" class="shoulder-glow shoulder-left"></div>
  <div id="glow-r" class="shoulder-glow shoulder-right"></div>

  <div id="stick-layer">
    <div id="stick-shadow"></div>
    <div id="stick-cap"></div>
    <div id="stick-glow"></div>
  </div>

  <div id="dpad-up" class="dpad-hit"></div>
  <div id="dpad-down" class="dpad-hit"></div>
  <div id="dpad-left" class="dpad-hit"></div>
  <div id="dpad-right" class="dpad-hit"></div>

  <div id="status">Connect the MF103 in XInput mode and press a button</div>
  <section id="debug" hidden>
    <div><strong>Controller:</strong> <span id="debug-name">—</span></div>
    <div><strong>Buttons:</strong> <span id="debug-buttons">—</span></div>
    <div><strong>Axes:</strong> <span id="debug-axes">—</span></div>
  </section>
</div>
<script src="script.js"></script>
</body>
</html>

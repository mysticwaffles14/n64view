<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>N64View</title>

    <link rel="stylesheet" href="style.css">

</head>

<body class="skin-classic">
    <div id="developer-header">
        <h1>N64View</h1>
        <h2>Developer Dashboard</h2>
    </div>

<div id="skin-controls">
    <label for="skin-select">Skin:</label>

    <select id="skin-select">
        <option value="classic">Classic N64</option>
        <option value="minimal">Minimal</option>
    </select>
</div>

<div id="viewport">
    <img
    id="controller-base"
    src="assets/n64-controller-base.png"
    alt=""
>
<div id="grid"></div>

    <div id="a-button" class="controller-button">A</div>
    <div id="b-button" class="controller-button">B</div>
    <div id="start-button" class="controller-button">START</div>
    <div id="z-button" class="controller-button">Z</div>

    <div id="l-button" class="controller-button">L</div>
    <div id="r-button" class="controller-button">R</div>

   <div id="c-buttons">
        <div id="c-up" class="c-button">▲</div>
        <div id="c-down" class="c-button">▼</div>
        <div id="c-left" class="c-button">◀</div>
        <div id="c-right" class="c-button">▶</div>
    </div>

    <div id="dpad">
        <div id="d-up" class="dpad-direction"></div>
        <div id="d-down" class="dpad-direction"></div>
        <div id="d-left" class="dpad-direction"></div>
        <div id="d-right" class="dpad-direction"></div>

        <div id="d-center"></div>
</div>

    <div id="stick-base">
        <div id="stick-indicator"></div>
    </div>

    <div id="layout-info"></div>

</div>
        
        <div id="debug-panel" class="panel">
            <p>
                A
                <span class="value" id="a-value">OFF</span>
            </p>

            <p>
                B
                <span class="value" id="b-value">OFF</span>
            </p>

            <p>
                Start
                <span class="value" id="start-value">OFF</span>
            </p>

            <p>
                Stick X
                <span class="value" id="stick-x">0.00</span>
            </p>

            <p>
                Stick Y
                <span class="value" id="stick-y">0.00</span>
            </p>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>

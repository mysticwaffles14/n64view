<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>N64View</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

<div id="app">

    <h1>N64View</h1>

    <h2>Developer Dashboard</h2>

    <div class="panel">

        <p>A: <span id="a-value">OFF</span></p>

        <p>B: <span id="b-value">OFF</span></p>

        <p>Start: <span id="start-value">OFF</span></p>

        <br>

        <p>Stick X:
            <span id="stick-x">0.00</span>
        </p>

        <p>Stick Y:
            <span id="stick-y">0.00</span>
        </p>

    </div>

</div>

<script type="module" src="js/main.js"></script>

</body>

</html>

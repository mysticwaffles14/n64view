<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <title>N64View</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>
    <body>
    <div id="app">
        <h1>N64View</h1>
        <h2>Developer Dashboard</h2>

        <div id="viewport">
            <div id="a-button">
                A
            </div>
        </div>

        <div class="panel">
            <p>
                A
                <span class="value" id="a-value">OFF</span>
            </p>

            <p>
                B
                <span class="value" id="b-value">OFF</span>
            </p>

            <p>
                Start
                <span class="value" id="start-value">OFF</span>
            </p>

            <p>
                Stick X
                <span class="value" id="stick-x">0.00</span>
            </p>

            <p>
                Stick Y
                <span class="value" id="stick-y">0.00</span>
            </p>
        </div>
    </div>

    <script type="module" src="js/main.js"></script>
</body>

</html>
